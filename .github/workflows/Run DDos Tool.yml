name: Run DDos Tool

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Tool mode to run'
        required: true
        default: 'http'
      target:
        description: 'Target URL or host for the selected mode'
        required: true
        default: 'https://linkjust.com/'
      requests:
        description: 'Number of HTTP requests or UDP packets'
        required: true
        default: '100'
      workers:
        description: 'Number of concurrent worker threads'
        required: true
        default: '20'
      rate:
        description: 'Requests or packets per second'
        required: true
        default: '10'
      allow_remote:
        description: 'Allow remote target testing'
        required: true
        default: 'false'
        type: boolean
      confirm:
        description: 'Confirm you are authorized to test this target'
        required: true
        default: 'false'
        type: boolean

jobs:
  run-tool:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip
        run: python -m pip install --upgrade pip

      - name: Run load test
        working-directory: linkjust
        run: |
          set -e
          CMD="python start.py --mode '${{ github.event.inputs.mode }}' --target '${{ github.event.inputs.target }}' --requests '${{ github.event.inputs.requests }}' --workers '${{ github.event.inputs.workers }}' --rate '${{ github.event.inputs.rate }}' --confirm"
          if [ "${{ github.event.inputs.allow_remote }}" = "true" ]; then
            CMD="$CMD --allow-remote"
          fi
          echo "Running: $CMD"
          eval "$CMD"
